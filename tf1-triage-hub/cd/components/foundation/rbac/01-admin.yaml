apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tf1-cluster-admin
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
- nonResourceURLs: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tf1-cluster-admin-binding
subjects:
- kind: Group
  name: "tf1-admins" # Gắn quyền này cho tất cả User thuộc nhóm tf1-admins
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: tf1-cluster-admin
  apiGroup: rbac.authorization.k8s.io
