apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tf1-reviewer-role
rules:
- apiGroups: ["", "apps", "extensions", "batch", "networking.k8s.io"]
  resources: ["*"]
  verbs: ["get", "watch", "list"] # CHỈ ĐƯỢC PHÉP ĐỌC VÀ XEM
# Không cấp quyền xem Secrets để bảo mật
- apiGroups: [""]
  resources: ["secrets"]
  verbs: [] 
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tf1-reviewer-binding
subjects:
- kind: Group
  name: "tf1-reviewers" # Gắn cho nhóm QA, Tester, Giám đốc...
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: tf1-reviewer-role
  apiGroup: rbac.authorization.k8s.io
