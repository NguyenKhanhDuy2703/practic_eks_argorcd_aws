apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: tf1-sandbox # Thay bằng namespace bạn muốn bảo vệ
spec:
  podSelector: {} # Áp dụng cho TẤT CẢ các Pods trong namespace này
  policyTypes:
  - Ingress # Chặn toàn bộ traffic chiều VÀO
  - Egress  # Chặn toàn bộ traffic chiều RA
